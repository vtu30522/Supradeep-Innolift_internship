<!DOCTYPE html>
<html>
<head>
    <title>Register Student</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav>
    <div class="logo">Student Portal</div>

    <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/register">Register</a></li>
        <li><a href="/students">Students</a></li>
        <li><a href="/about">About</a></li>
    </ul>
</nav>

<div class="form-container">

    <h2>Student Registration</h2>

    <form action="/register" method="POST">

        <label>Name</label>
        <input type="text" name="name" required>

        <br><br>

        <label>Course</label>
        <input type="text" name="course" required>

        <br><br>

        <label>Gender</label>

        <div class="gender">

            <label>
                <input type="radio"
                       name="gender"
                       value="Male"
                       required>
                Male
            </label>

            <label>
                <input type="radio"
                       name="gender"
                       value="Female">
                Female
            </label>

            <label>
                <input type="radio"
                       name="gender"
                       value="Other">
                Other
            </label>

        </div>

        <br>

        <button type="submit">
            Register Student
        </button>

    </form>

</div>

</body>
</html>
